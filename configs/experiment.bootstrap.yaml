schema_version: 2
experiment_id: bootstrap-config-validation
status: validation_only

protocol:
  master_plan_version: v1.12
  experiment_protocol_version: v2
  task_timepoint: T0
  unit_of_analysis: dataset_native_content_item
  label_window: dataset_specific_freeze_before_test

data:
  dataset_id: PRE_M1_NO_DATA
  dataset_version: pending_m1
  split_version: pending_m2
  manifest: DATA_SOURCE_LEDGER.md
  index_scope: train_only

run:
  seed: 20260714
  input_modalities:
    - visual_content
  baseline: config_validation_only
  primary_metric: jensen_shannon_divergence
  stop_condition: leakage_check_failure
  output_dir: results/bootstrap-config-validation

representation_contract:
  family: I3D
  state: QUARANTINE_ONLY_PENDING_G2_ASSET_ADMISSION
  sequence_protocol: configs/csmv-i3d-sequence-protocol-v1.json
  main_rule: FULL_SEQUENCE_DYNAMIC_PADDING_MASK
  primary_sensitivity: UNIFORM_180_ENDPOINT_INCLUSIVE
  test_adaptation_allowed: false
  all_splits_same_rule: true

modality_contract:
  policy: ACTUAL_AVAILABLE_INPUTS_ONLY
  structurally_unavailable:
    - audio
  missing_modality_experiment_eligible: false
  not_applicable_reason: NOT_APPLICABLE_SINGLE_AVAILABLE_INPUT_MODALITY

leakage:
  forbidden_inputs:
    - target_future_comments
    - final_engagement
    - future_retrieval_candidates
  fit_statistics_on: train_only
  test_comments_input_allowed: false
